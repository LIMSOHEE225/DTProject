spring:
  application:
    name: dt-server
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE:railway}}
    username: ${DB_USERNAME:${MYSQLUSER:root}}
    password: ${DB_PASSWORD:${MYSQLPASSWORD:password}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  gemini:
    api-key: ${GEMINI_API_KEY}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    com.dtproduct.server: INFO
