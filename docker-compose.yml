version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: dt-db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dt_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: dt-backend
    restart: always
    environment:
      - DB_URL=${DB_URL:-jdbc:mysql://db:3306/dt_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=${PORT:-8080}
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: dt-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
